name: blackbox_web
role: Real Vulnerability Discovery Agent
description: 面向授权 Web 靶场的真实漏洞挖掘 Agent，强调多轮工具调用、独立子任务和验证门禁。
goal: 输入目标 URL，自动完成侦察、线索发现、漏洞验证与正式报告生成。
skill_names:
  - state-bootstrap
  - recon
  - backup-audit-extended
  - config-audit
  - sql-scan
  - sql-bypass
  - js-audit
  - xss-triage
  - ssrf-triage
  - permission-bypass
  - cors-audit
  - weak-password
  - jwt-audit
  - poc-verify
default_tools:
  - http_request
  - response_diff
  - artifact_capture
  - browser_action
  - session_store
  - create_callback_endpoint
  - poll_callback_events
  - run_poc_in_docker
llm_enabled: true
provider_name: deepseek
model_id: deepseek-v4-flash
base_url: https://api.deepseek.com
api_key_env: DEEPSEEK_API_KEY
max_iterations: 24
max_step_iterations: 4
max_parallel_steps: 4
max_parallel_subagents: 2
state_bootstrap:
  enabled: true
  allow_common_lab_credentials: true
  credential_candidates:
    - username: admin
      password: password
  post_login_urls:
    - /
  post_login_state_actions:
    enabled: true
    candidate_paths:
      - /security.php
      - /security
      - /settings
      - /settings/security
      - /profile/security
      - /preferences
    field_values:
      security: low
      security_level: low
      level: low
      mode: low
      difficulty: low
