name: frontend_audit
role: Frontend JavaScript Security Audit Agent
description: 面向前端资源、JavaScript Bundle、DOM/XSS 线索和前端派生 API 的安全审计 Agent。
goal: 从目标页面和脚本中提取敏感信息、危险 source/sink、派生接口和权限边界线索，并联动验证高价值发现。
skill_names:
  - state-bootstrap
  - js-audit
  - xss-triage
  - permission-bypass
  - poc-verify
default_tools:
  - http_request
  - response_diff
  - artifact_capture
  - browser_action
  - session_store
  - run_poc_in_docker
llm_enabled: true
provider_name: deepseek
model_id: deepseek-v4-flash
base_url: https://api.deepseek.com
api_key_env: DEEPSEEK_API_KEY
max_iterations: 18
max_step_iterations: 4
max_parallel_steps: 2
max_parallel_subagents: 1
state_bootstrap:
  enabled: true
  allow_common_lab_credentials: true
  credential_candidates:
    - username: admin
      password: password
  post_login_urls:
    - /
  post_login_state_actions:
    enabled: true
    candidate_paths:
      - /security.php
      - /security
      - /settings
      - /settings/security
      - /profile/security
      - /preferences
    field_values:
      security: low
      security_level: low
      level: low
      mode: low
      difficulty: low
